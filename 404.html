<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="robots" content="noindex" />
  <title>Page not found — Curious Men Films</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #f5f5f5;
      --muted: #a0a0a0;
      --accent: #8b5cf6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }
    .code {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), #ec4899);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 1rem;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    a.btn {
      display: inline-block;
      padding: 14px 28px;
      background: var(--fg);
      color: var(--bg);
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    a.btn:hover { transform: translateY(-2px); background: #fff; }
    a.btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <div class="code" aria-hidden="true">404</div>
    <h1>This page doesn't exist.</h1>
    <p>The link you followed may be broken, or the page may have moved. Head back to the homepage — all our stories live there.</p>
    <a class="btn" href="/">Back to home</a>
  </main>
</body>
</html>
